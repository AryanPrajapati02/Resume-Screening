services:
  - type: web
    name: resume-screening-api
    env: python
    region: singapore
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port ${PORT}
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
